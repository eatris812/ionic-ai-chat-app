<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Chat</title>
    <script type="module" src="https://cdn.jsdelivr.net/npm/@ionic/core/dist/ionic/ionic.esm.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/@ionic/core/css/ionic.bundle.css" rel="stylesheet">
    <link href="./style.css" rel="stylesheet">
  </head>
  <body>
    <ion-app>
      <ion-split-pane when="md" content-id="main-content">
        <ion-menu content-id="main-content">
          <ion-header>
            <ion-toolbar>
              <ion-title>Chats</ion-title>
              <ion-buttons slot="end">
                <ion-button id="newChatBtn">
                  <ion-icon name="add-outline"></ion-icon>
                </ion-button>
              </ion-buttons>
            </ion-toolbar>
          </ion-header>
          <ion-content>
            <ion-list id="chatHistoryList">
              <!-- chat history -->
            </ion-list>
          </ion-content>
        </ion-menu>

        <div class="ion-page" id="main-content">
          <ion-header>
            <ion-toolbar>
              <ion-buttons slot="start">
                <ion-menu-button></ion-menu-button>
              </ion-buttons>
              <ion-title>Chat</ion-title>
            </ion-toolbar>
          </ion-header>

          <ion-content>
            <div class="messages-container" id="chatList">
              <div class="empty-state" id="emptyState">
                <ion-icon name="chatbubbles-outline"></ion-icon>
                <h2>Welcome to AI Chat</h2>
                <p>Start a new conversation or select an existing chat</p>
              </div>
            </div>
          </ion-content>

        <ion-footer>
          <ion-toolbar>
            <ion-grid>
              <ion-row>
                <ion-col size="12">
                  <ion-item lines="none">
                    <ion-icon name="sparkles-outline" slot="start" color="primary"></ion-icon>
                    <ion-label>Choose AI Model</ion-label>
                    <ion-select id="modelSelect" interface="action-sheet" placeholder="Select AI" cancel-text="Cancel" ok-text="OK">
                      <ion-select-option value="meta-llama/llama-3.1-8b-instruct">Llama 3.1 8B</ion-select-option>
                      <ion-select-option value="mistralai/mistral-7b-instruct">Mistral 7B</ion-select-option>
                      <ion-select-option value="mistralai/mixtral-8x7b-instruct">Mixtral 8x7B</ion-select-option>
                    </ion-select>
                  </ion-item>
                </ion-col>
              </ion-row>
              <ion-row>
                <ion-col size="12">
                  <ion-item>
                    <ion-textarea id="messageInput" placeholder="Type your message..." auto-grow="true" rows="1"></ion-textarea>
                    <ion-button id="sendButton" slot="end" color="primary" fill="solid" shape="round">
                      <ion-icon name="send-outline" slot="icon-only"></ion-icon>
                    </ion-button>
                  </ion-item>
                </ion-col>
              </ion-row>
            </ion-grid>
          </ion-toolbar>
        </ion-footer>
        </div>
      </ion-split-pane>
    </ion-app>
    <script type="module" src="main.js"></script>

  </body>
</html>
